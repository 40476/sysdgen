name: SysdGen Linux Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  APP_NAME: "SysdGen"
  PYTHON_VERSION: '3.12'
  # Centralized system dependencies
  SYS_DEPS: >-
    libxcb-cursor0 libxkbcommon-x11-0 libegl1 libdbus-1-3 
    libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 
    libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 
    libxcb-xfixes0 libxcb-xkb1 libxcb-xv0
  # Centralized PyInstaller flags to ensure all internal modules are found
  PYINSTALLER_ARGS: >-
    --noconsole --onefile 
    --add-data "sysdgen:sysdgen" 
    --collect-all sysdgen
    --hidden-import PyQt6.QtCore 
    --hidden-import PyQt6.QtGui 
    --hidden-import PyQt6.QtWidgets

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies (Qt)
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.SYS_DEPS }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ env.PYINSTALLER_ARGS }} \
            --name "${{ env.APP_NAME }}-Linux-x64" \
            run_sysdgen.py
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-x64
          path: dist/${{ env.APP_NAME }}-Linux-x64

  build-linux-x86:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Build in i386 container
        run: |
          docker run --rm -v ${{ github.workspace }}:/src i386/ubuntu:22.04 /bin/bash -c "
            apt-get update &&
            apt-get install -y python3 python3-pip ${{ env.SYS_DEPS }} &&
            pip3 install --upgrade pip &&
            pip3 install PyQt6 pyinstaller &&
            cd /src &&
            pyinstaller ${{ env.PYINSTALLER_ARGS }} --name '${{ env.APP_NAME }}-Linux-x86' run_sysdgen.py
          "
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-x86
          path: dist/${{ env.APP_NAME }}-Linux-x86

  build-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Build in ARM64 container
        run: |
          docker run --rm -v ${{ github.workspace }}:/src arm64v8/ubuntu:22.04 /bin/bash -c "
            apt-get update &&
            apt-get install -y python3 python3-pip ${{ env.SYS_DEPS }} &&
            pip3 install --upgrade pip &&
            pip3 install PyQt6 pyinstaller &&
            cd /src &&
            pyinstaller ${{ env.PYINSTALLER_ARGS }} --name '${{ env.APP_NAME }}-Linux-ARM64' run_sysdgen.py
          "
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-ARM64
          path: dist/${{ env.APP_NAME }}-Linux-ARM64