name: SysdGen Linux Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  APP_NAME: "SysdGen"
  PYTHON_VERSION: '3.12'
  SYS_DEPS: >-
    libxcb-cursor0 libxkbcommon-x11-0 libegl1 libdbus-1-3 
    libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 
    libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 
    libxcb-xfixes0 libxcb-xkb1 libxcb-xv0
  PYINSTALLER_BASE: >-
    --onefile --add-data "sysdgen:sysdgen" --collect-all sysdgen

jobs:
  build-linux:
    name: ${{ matrix.arch }} (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, ARM64]
        mode: [Windowed, Console]

    steps:
      - uses: actions/checkout@v4

      # 1. NATIVE X64 BUILD (Fastest)
      - name: Build Native x64
        if: matrix.arch == 'x64'
        run: |
          sudo apt-get update && sudo apt-get install -y ${{ env.SYS_DEPS }}
          pip install PyQt6 pyinstaller -r requirements.txt
          
          FLAGS="${{ matrix.mode == 'Windowed' && '--noconsole' || '' }}"
          NAME_EXT="${{ matrix.mode == 'Console' && '-Debug' || '' }}"
          
          pyinstaller ${{ env.PYINSTALLER_BASE }} $FLAGS \
            --name "${{ env.APP_NAME }}-x64$NAME_EXT" run_sysdgen.py

      # 2. EMULATED BUILDS (x86 and ARM64)
      - name: Set up QEMU
        if: matrix.arch != 'x64'
        uses: docker/setup-qemu-action@v3

      - name: Build Emulated
        if: matrix.arch != 'x64'
        run: |
          PLATFORM="${{ matrix.arch == 'x86' && 'linux/386' || 'linux/arm64' }}"
          FLAGS="${{ matrix.mode == 'Windowed' && '--noconsole' || '' }}"
          NAME_EXT="${{ matrix.mode == 'Console' && '-Debug' || '' }}"
          
          docker run --rm --platform $PLATFORM \
            -v ${{ github.workspace }}:/src ubuntu:22.04 /bin/bash -c "
            apt-get update && apt-get install -y python3 python3-pip ${{ env.SYS_DEPS }} &&
            pip3 install PyQt6 pyinstaller &&
            cd /src &&
            pyinstaller ${{ env.PYINSTALLER_BASE }} $FLAGS \
              --name '${{ env.APP_NAME }}-${{ matrix.arch }}$NAME_EXT' run_sysdgen.py
          "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.arch }}-${{ matrix.mode }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.arch }}*