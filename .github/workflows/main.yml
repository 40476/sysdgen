name: SysdGen Linux Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install system dependencies (Qt)
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libegl1 \
          libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
          libxcb-xfixes0 libxcb-xkb1 libxcb-xv0
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile \
          --name "SysdGen-Linux-x64" \
          --add-data "sysdgen:sysdgen" \
          --hidden-import PyQt6.QtCore \
          --hidden-import PyQt6.QtGui \
          --hidden-import PyQt6.QtWidgets \
          run_sysdgen.py
        echo "Binary size:"
        ls -lh dist/SysdGen-Linux-x64
    - uses: actions/upload-artifact@v4
      with:
        name: SysdGen-Linux-x64
        path: dist/SysdGen-Linux-x64

  build-linux-x86:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Build in i386 container
      run: |
        docker run --rm -v ${{ github.workspace }}:/src i386/ubuntu:22.04 /bin/bash -c "
          apt-get update &&
          apt-get install -y python3 python3-pip libxcb-cursor0 libxkbcommon-x11-0 \
            libegl1-mesa libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-xkb1 libxcb-xv0 &&
          pip3 install --upgrade pip &&
          pip3 install PyQt6 pyinstaller &&
          cd /src &&
          pyinstaller --noconsole --onefile \
            --name 'SysdGen-Linux-x86' \
            --add-data 'sysdgen:sysdgen' \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import PyQt6.QtWidgets \
            run_sysdgen.py &&
          echo 'Binary size:' &&
          ls -lh dist/SysdGen-Linux-x86
        "
    - uses: actions/upload-artifact@v4
      with:
        name: SysdGen-Linux-x86
        path: dist/SysdGen-Linux-x86

  build-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Build in ARM64 container
      run: |
        docker run --rm -v ${{ github.workspace }}:/src arm64v8/ubuntu:22.04 /bin/bash -c "
          apt-get update &&
          apt-get install -y python3 python3-pip libxcb-cursor0 libxkbcommon-x11-0 \
            libegl1-mesa libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-xkb1 libxcb-xv0 &&
          pip3 install --upgrade pip &&
          pip3 install PyQt6 pyinstaller &&
          cd /src &&
          pyinstaller --noconsole --onefile \
            --name 'SysdGen-Linux-ARM64' \
            --add-data 'sysdgen:sysdgen' \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import PyQt6.QtWidgets \
            run_sysdgen.py &&
          echo 'Binary size:' &&
          ls -lh dist/SysdGen-Linux-ARM64
        "
    - uses: actions/upload-artifact@v4
      with:
        name: SysdGen-Linux-ARM64
        path: dist/SysdGen-Linux-ARM64
