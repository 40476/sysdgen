name: SysdGen Linux Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  APP_NAME: "SysdGen"
  PYTHON_VERSION: '3.12'
  SYS_DEPS: >-
    libxcb-cursor0 libxkbcommon-x11-0 libegl1 libdbus-1-3 
    libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 
    libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 
    libxcb-xfixes0 libxcb-xkb1 libxcb-xv0

jobs:
  build-linux:
    name: Build ${{ matrix.arch }} (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Define architectures and build modes (Console vs NoConsole)
        arch: [x64, x86, ARM64]
        mode: [Windowed, Console]
        include:
          - arch: x64
            platform: linux/amd64
            docker_img: ubuntu:24.04
          - arch: x86
            platform: linux/386
            docker_img: ubuntu:22.04
          - arch: ARM64
            platform: linux/arm64
            docker_img: ubuntu:22.04
          # Set PyInstaller flag based on mode
          - mode: Windowed
            console_flag: "--noconsole"
          - mode: Console
            console_flag: ""

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        if: matrix.arch != 'x64'
        uses: docker/setup-qemu-action@v3

      - name: Build Application
        run: |
          # Create a suffix for the filename
          MODE_SUFFIX="${{ matrix.mode == 'Console' && '-Debug' || '' }}"
          
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/src ${{ matrix.docker_img }} /bin/bash -c "
            apt-get update &&
            apt-get install -y python3 python3-pip ${{ env.SYS_DEPS }} &&
            pip3 install --upgrade pip &&
            pip3 install PyQt6 pyinstaller &&
            cd /src &&
            pyinstaller ${{ matrix.console_flag }} --onefile \
              --add-data 'sysdgen:sysdgen' \
              --collect-all sysdgen \
              --name '${{ env.APP_NAME }}-${{ matrix.arch }}${MODE_SUFFIX}' \
              run_sysdgen.py
          "

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.arch }}-${{ matrix.mode }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.arch }}*